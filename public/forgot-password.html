<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset password — LoopBack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="brand" style="justify-content:center; margin-bottom: 8px;">
      <span class="brand-mark">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
          <circle cx="13" cy="13" r="11.5" stroke="var(--accent)" stroke-width="1.6"/>
          <circle cx="13" cy="13" r="7" stroke="var(--accent-2)" stroke-width="1.6"/>
          <circle cx="13" cy="13" r="2.4" fill="var(--accent)"/>
        </svg>
      </span>
      <span class="brand-name">LoopBack</span>
    </div>
    <p class="panel-sub" style="text-align:center; margin-bottom: 18px;">
      Enter your email and we'll send you a link to reset your password.
    </p>

    <form id="forgotForm">
      <label class="field-label">Email</label>
      <input type="email" id="email" class="text-input" placeholder="you@example.com" required />
      <button type="submit" class="btn btn-primary full-width" id="submitBtn" style="margin-top: 16px;">Send reset link</button>
    </form>

    <p class="auth-success" id="successMsg" hidden></p>
    <p class="auth-error" id="errorMsg" hidden></p>

    <p class="auth-footer-link"><a href="/login.html">Back to sign in</a></p>
  </div>
</div>

<script>
  const form = document.getElementById('forgotForm');
  const submitBtn = document.getElementById('submitBtn');
  const successMsg = document.getElementById('successMsg');
  const errorMsg = document.getElementById('errorMsg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    successMsg.hidden = true;
    errorMsg.hidden = true;

    const email = document.getElementById('email').value.trim();
    try {
      const res = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Something went wrong');
      successMsg.textContent = data.message;
      successMsg.hidden = false;
      form.reset();
    } catch (err) {
      errorMsg.textContent = err.message;
      errorMsg.hidden = false;
    } finally {
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
