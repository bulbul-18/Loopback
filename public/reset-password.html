<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Set new password — LoopBack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="brand" style="justify-content:center; margin-bottom: 8px;">
      <span class="brand-mark">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
          <circle cx="13" cy="13" r="11.5" stroke="var(--accent)" stroke-width="1.6"/>
          <circle cx="13" cy="13" r="7" stroke="var(--accent-2)" stroke-width="1.6"/>
          <circle cx="13" cy="13" r="2.4" fill="var(--accent)"/>
        </svg>
      </span>
      <span class="brand-name">LoopBack</span>
    </div>
    <p class="panel-sub" style="text-align:center; margin-bottom: 18px;">Set a new password</p>

    <form id="resetForm">
      <label class="field-label">New password</label>
      <input type="password" id="password" class="text-input" placeholder="••••••••" required minlength="8" />
      <p class="field-hint">At least 8 characters</p>
      <button type="submit" class="btn btn-primary full-width" id="submitBtn" style="margin-top: 10px;">Set new password</button>
    </form>

    <p class="auth-success" id="successMsg" hidden></p>
    <p class="auth-error" id="errorMsg" hidden></p>

    <p class="auth-footer-link"><a href="/login.html">Back to sign in</a></p>
  </div>
</div>

<script>
  const form = document.getElementById('resetForm');
  const submitBtn = document.getElementById('submitBtn');
  const successMsg = document.getElementById('successMsg');
  const errorMsg = document.getElementById('errorMsg');
  const token = new URLSearchParams(location.search).get('token');

  if (!token) {
    form.hidden = true;
    errorMsg.textContent = 'This reset link is missing its token. Request a new one from the sign-in page.';
    errorMsg.hidden = false;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    successMsg.hidden = true;
    errorMsg.hidden = true;

    const password = document.getElementById('password').value;
    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Something went wrong');
      successMsg.textContent = 'Password updated. Redirecting to sign in…';
      successMsg.hidden = false;
      form.hidden = true;
      setTimeout(() => (location.href = '/login.html'), 1800);
    } catch (err) {
      errorMsg.textContent = err.message;
      errorMsg.hidden = false;
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
