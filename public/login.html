<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — LoopBack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="brand" style="justify-content:center; margin-bottom: 20px;">
      <span class="brand-mark">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
          <circle cx="13" cy="13" r="11.5" stroke="var(--accent)" stroke-width="1.6"/>
          <circle cx="13" cy="13" r="7" stroke="var(--accent-2)" stroke-width="1.6"/>
          <circle cx="13" cy="13" r="2.4" fill="var(--accent)"/>
        </svg>
      </span>
      <span class="brand-name">LoopBack</span>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-mode="login">Sign in</button>
      <button class="auth-tab" data-mode="register">Create account</button>
    </div>

    <div id="googleSection" hidden>
      <a class="btn btn-google" href="/auth/google">
        <svg width="16" height="16" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.97 10.72A5.4 5.4 0 0 1 3.68 9c0-.6.1-1.18.29-1.72V4.95H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.05l3.01-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.59-2.59C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
        Continue with Google
      </a>
      <div class="auth-divider"><span>or</span></div>
    </div>

    <form id="authForm">
      <label class="field-label">Email</label>
      <input type="email" id="email" class="text-input" placeholder="you@example.com" required />

      <label class="field-label">Password</label>
      <input type="password" id="password" class="text-input" placeholder="••••••••" required minlength="8" />
      <p class="field-hint" id="passwordHint" hidden>At least 8 characters</p>

      <button type="submit" class="btn btn-primary full-width" id="submitBtn">Sign in</button>
    </form>

    <p class="auth-error" id="authError" hidden></p>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
